# EasyPseudogene Default Configuration

# Prefilter settings
ENABLE_PREFILTER=1

# Unitary filters
ENABLE_FAMILY_FILTER=1
FAMILY_PATTERNS="olfactory receptor|vomeronasal|zinc finger|^OR|^V1R|^V2R|^TAAR|^ZNF|^ZFP"

ENABLE_PREDICTED_FILTER=1
PREDICTED_PATTERNS="predicted|intronless|cDNA|expressed sequence"

ENABLE_REDUNDANCY_FILTER=1
MINIPROT_MIN_ALN_LEN=30
MINIPROT_MIN_COV=0.3
MINIPROT_MIN_ID=0.3
MINIPROT_MIN_MAPQ=0
REDUNDANCY_COPY_COV=0.8
REDUNDANCY_TARGET_GAP=10000

ENABLE_SYNTENY_FILTER=0

# False-positive filters
ENABLE_FALSE_POSITIVE_FILTER=1
END_MUTATION_FRAC=0.9
LOW_ID_FLANK_SIZE=30
LOW_ID_FLANK_TH=0.2
LOW_ID_OVERALL_TH=0.1
LOW_ID_MODE=and

# Multi-disruption quality filter
ENABLE_MULTI_DISRUPTION_QUALITY_FILTER=1
MULTI_DISRUPTION_MIN_COV=0.7
MULTI_DISRUPTION_MIN_ID=0.05
MULTI_DISRUPTION_MIN_ALN_LEN=200

# Global alignment quality filter
ENABLE_GLOBAL_ALIGNMENT_FILTER=1
GLOBAL_MIN_COV=0.7
GLOBAL_MIN_ID=0.3
GLOBAL_MIN_ALN_LEN=200

# Screening parameters
FLANK=1000
MMSEQS_SEARCH_TYPE=3
MMSEQS_SENS=7.5
MMSEQS_EVALUE=1e-3
MMSEQS_MAX_SEQS=5
